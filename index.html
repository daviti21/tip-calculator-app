<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tip calculator app</title>
    <link href="style.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="cont">
      <img src="logo.svg" class="logo">
        <form id="form">
            <div class="left"> 
            <div class="money">
                <p class="money-tit">Bill</p>
                <div class="money-box">
                    <img src="icon-dollar.svg" class="dollar">
                    <input type="text" inputmode="numeric" pattern="[0-9]*" class="dol-inp">
                </div>
            </div>
            <div class="tip">
                <p class="tip-tit">Select Tip %</p>
                <div class="button-box">
                    <button type="submit" class="tup-btn" id="btn5">5%</button>
                    <button type="submit" class="tup-btn" id="btn10">10%</button>
                    <button type="submit" class="tup-btn" id="btn15">15%</button>
                    <button type="submit" class="tup-btn" id="btn25">25%</button>
                    <button type="submit" class="tup-btn" id="btn50">50%</button>
                    <button type="submit" class="custom-btn" id="custom">Custom</button>

                </div>
            </div>
            <div class="people">
                <p class="pep-tit">Number of People</p>
                <div class="pep-box">
                    <img src="icon-person.svg">
                    <input type="text" inputmode="numeric" pattern="[0-9]*" class="pepNum">
                </div>
            </div>
</div>
<div class="right">
    <div class="amount">
        <div class="left-amount">
            <p class="right-tit">Tip Amount</p>
            <p class="per-txt">/ person</p>
        </div>
        <input type="text" inputmode="numeric" pattern="[0-9]*" placeholder="$0.00">
    </div>
    <div class="total">
         <div class="left-tot">
            <p class="right-tit">Tip Amount</p>
            <p class="per-txt">/ person</p>
        </div>
        <input type="text" inputmode="numeric" pattern="[0-9]*" placeholder="$0.00">
    </div>
    </div>
    <button type="button" class="reset">RESET</button>
</div>
        </form>
    </div>
    <script src="app.js"></script>
</body>
</html>
